# Build na nuvem do app TransportaBR (Capacitor) — Android (.aab) e iOS (.ipa).
# Coloque este arquivo na raiz do repositório do FRONTEND e conecte o repo no codemagic.io.
#
# ANTES de rodar, configure no painel do Codemagic (ver CODEMAGIC.md):
#  - Android: faça upload de uma keystore com referência "transportabr_keystore".
#  - iOS: crie a integração "App Store Connect API key" e referencie em integrations.
#  - Bundle id / package: com.base69b029d8fcb18bdaa5bc7102.app (já é o appId do capacitor.config.ts).
#
# Obs.: VITE_API_URL e VITE_GOOGLE_CLIENT_ID já têm fallback embutido no código (produção),
# então o build funciona mesmo sem defini-los aqui.

workflows:
  # ------------------------------------------------------------------ ANDROID
  android:
    name: TransportaBR Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      groups:
        # Grupo com: CM_KEYSTORE (keystore .jks em base64), CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
        - android_credentials
      vars:
        PACKAGE_NAME: "com.base69b029d8fcb18bdaa5bc7102.app"
      node: 22
      java: 21
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build web + sync Capacitor (Android)
        script: |
          npm run build
          [ -d android ] || npx cap add android
          npx cap sync android
      - name: Gerar ícones/splash nativos
        script: npx capacitor-assets generate --android --iconBackgroundColor '#0f172a' --iconBackgroundColorDark '#0f172a' --splashBackgroundColor '#0f172a' --splashBackgroundColorDark '#0f172a'
      - name: Apontar o Android SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Decodificar keystore
        script: echo "$CM_KEYSTORE" | base64 --decode > /tmp/transportabr.jks
      - name: Gerar AAB assinado (release)
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/transportabr.jks \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS # JSON da service account (env var Secure no Codemagic)
        track: internal # troque para "production" para enviar à revisão da loja
        changes_not_sent_for_review: false

  # ---------------------------------------------------------------------- iOS
  ios:
    name: TransportaBR iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        # Grupo de variáveis com a App Store Connect API key (você cria no Codemagic):
        #   APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY
        # O CLI do Codemagic (app-store-connect / xcode-project) lê essas variáveis automaticamente.
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.base69b029d8fcb18bdaa5bc7102.app"
        XCODE_SCHEME: "App"
        MARKETING_VERSION: "1.1" # versão visível na loja — suba a cada release
        APP_STORE_APP_ID: "PREENCHER" # ID numérico do app no App Store Connect
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build web + add/sync Capacitor (iOS)
        script: |
          set -e
          npm run build
          rm -rf ios            # garante recriação limpa (evita ios/ incompleto sem Podfile)
          npx cap add ios
          npx cap sync ios
          echo "--- projeto iOS gerado (Capacitor 8 usa SPM, sem Podfile) ---"
          ls -la ios/App
      - name: Gerar ícones/splash nativos
        script: npx capacitor-assets generate --ios --iconBackgroundColor '#0f172a' --splashBackgroundColor '#0f172a'
      - name: Definir versão e build number (iOS)
        script: |
          cd ios/App
          agvtool new-marketing-version "$MARKETING_VERSION"
          # build number = último publicado na App Store + 1 (evita rejeição por número repetido)
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $(($LATEST + 1))
      - name: Configurar assinatura (cria certificado + profile)
        script: |
          set -e
          keychain initialize
          # Cria/reutiliza o certificado de distribuição a partir da SUA chave privada
          # (CERTIFICATE_PRIVATE_KEY, cadastrada no Codemagic). Reutilizável entre builds.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Gerar IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Para enviar direto à revisão da App Store (exige metadados/screenshots prontos no App Store Connect):
        # submit_to_app_store: true
