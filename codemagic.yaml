# Build na nuvem do app TransportaBR (Capacitor) — Android (.aab) e iOS (.ipa).
# Coloque este arquivo na raiz do repositório do FRONTEND e conecte o repo no codemagic.io.
#
# ANTES de rodar, configure no painel do Codemagic (ver CODEMAGIC.md):
#  - Android: faça upload de uma keystore com referência "transportabr_keystore".
#  - iOS: crie a integração "App Store Connect API key" e referencie em integrations.
#  - Bundle id / package: com.base69b029d8fcb18bdaa5bc7102.app (já é o appId do capacitor.config.ts).
#
# Obs.: VITE_API_URL e VITE_GOOGLE_CLIENT_ID já têm fallback embutido no código (produção),
# então o build funciona mesmo sem defini-los aqui.

workflows:
  # -------------------------------------------------- ANDROID (App preview)
  # Gera um APK de DEBUG (não assinado, sem publicação) para usar no
  # "App preview" do Codemagic. Rápido, sem keystore.
  android-preview:
    name: TransportaBR Android (preview/debug)
    instance_type: linux_x2
    max_build_duration: 45
    environment:
      vars:
        PACKAGE_NAME: "com.base69b029d8fcb18bdaa5bc7102.app"
      node: 22
      java: 21
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build web + sync Capacitor (Android)
        script: |
          npm run build
          [ -d android ] || npx cap add android
          npx cap sync android
      - name: Apontar o Android SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android (debug)
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  # ------------------------------------------------------ iOS (App preview)
  # Compila para o SIMULADOR (SDK iphonesimulator), sem assinatura, gerando
  # um .app que o "App preview" do Codemagic roda no navegador.
  ios-simulator:
    name: TransportaBR iOS (simulador/preview)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      vars:
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build web + sync Capacitor (iOS)
        script: |
          set -e
          npm run build
          [ -d ios ] || npx cap add ios
          npx cap sync ios
      - name: Build para o simulador (sem assinatura)
        script: |
          set -e
          xcodebuild build \
            -project "ios/App/App.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      # O .app do simulador que alimenta o App preview do Codemagic.
      - build/Build/Products/Debug-iphonesimulator/*.app

  # ------------------------------------------------------------------ ANDROID
  android:
    name: TransportaBR Android
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      groups:
        # Grupo com: CM_KEYSTORE (keystore .jks em base64), CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
        - android_credentials
      vars:
        PACKAGE_NAME: "com.base69b029d8fcb18bdaa5bc7102.app"
      node: 22
      java: 21
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build web + sync Capacitor (Android)
        script: |
          npm run build
          [ -d android ] || npx cap add android
          npx cap sync android
      - name: Gerar ícones/splash nativos
        script: npx capacitor-assets generate --android --iconBackgroundColor '#0f172a' --iconBackgroundColorDark '#0f172a' --splashBackgroundColor '#0f172a' --splashBackgroundColorDark '#0f172a'
      - name: Apontar o Android SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Calcular versionCode (maior na Play + 1)
        script: |
          set -e
          # Pergunta ao Google Play qual o maior versionCode já enviado (em qualquer track)
          # e usa esse valor + 1. Assim nunca colide com um código já usado, independente
          # do $BUILD_NUMBER do Codemagic.
          CREDS="$GCLOUD_SERVICE_ACCOUNT_CREDENTIALS"
          [ -n "$CREDS" ] || CREDS="$GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS"
          LATEST=$(echo "$CREDS" | google-play get-latest-build-number \
            --package-name "$PACKAGE_NAME" \
            --credentials @stdin) || LATEST=""
          # Fallback: se a consulta falhar, usa o $BUILD_NUMBER (ainda pode colidir,
          # mas evita travar a build por falha de rede/credencial).
          [ -n "$LATEST" ] || LATEST="$BUILD_NUMBER"
          NEW_CODE=$((LATEST + 1))
          echo "VERSION_CODE=$NEW_CODE" >> "$CM_ENV"
          echo "Maior versionCode na Play: $LATEST -> usando $NEW_CODE"
      - name: Decodificar keystore
        script: echo "$CM_KEYSTORE" | base64 --decode > /tmp/transportabr.jks
      - name: Gerar AAB assinado (release)
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -PversionCode=$VERSION_CODE \
            -Pandroid.injected.signing.store.file=/tmp/transportabr.jks \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS # JSON da service account (env var Secure no Codemagic)
        track: internal # troque para "production" para enviar à revisão da loja
        changes_not_sent_for_review: false

  # ---------------------------------------------------------------------- iOS
  ios:
    name: TransportaBR iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        # Grupo de variáveis com a App Store Connect API key (você cria no Codemagic):
        #   APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY
        # O CLI do Codemagic (app-store-connect / xcode-project) lê essas variáveis automaticamente.
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.base69b029d8fcb18bdaa5bc7102.app"
        XCODE_SCHEME: "App"
        MARKETING_VERSION: "2.0" # versão visível na loja — suba a cada release
        APP_STORE_APP_ID: "PREENCHER" # ID numérico do app no App Store Connect
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependências
        script: npm install
      - name: Build web + sync Capacitor (iOS)
        script: |
          set -e
          npm run build
          # NÃO apagar ios/: a pasta está no git com o Sign in with Apple
          # (App/App.entitlements + CODE_SIGN_ENTITLEMENTS no pbxproj) e o URL
          # scheme do Google (CFBundleURLTypes no Info.plist). Recriar do zero
          # com "cap add ios" removeria essas configs e quebraria o login social.
          # Só cria se a pasta não existir (primeiro build de um repo limpo).
          [ -d ios ] || npx cap add ios
          npx cap sync ios
          ls -la ios/App
      - name: Gerar ícones/splash nativos
        script: npx capacitor-assets generate --ios --iconBackgroundColor '#0f172a' --splashBackgroundColor '#0f172a'
      - name: Definir versão e build number (iOS)
        script: |
          cd ios/App
          agvtool new-marketing-version "$MARKETING_VERSION"
          # build number = contador de build do Codemagic (sempre incrementa a cada build,
          # então nunca repete um número já enviado à App Store).
          agvtool new-version -all "$BUILD_NUMBER"
          # Export compliance: declara que o app não usa criptografia não isenta.
          # Sem isso, todo build fica preso em "Processing" aguardando resposta manual,
          # e o passo de distribuição/TestFlight do Codemagic trava até dar timeout.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist
      - name: Configurar assinatura (cria certificado + profile)
        script: |
          set -e
          keychain initialize
          # Cria/reutiliza o certificado de distribuição a partir da SUA chave privada
          # (CERTIFICATE_PRIVATE_KEY, cadastrada no Codemagic). Reutilizável entre builds.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Gerar IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        # Para enviar direto à revisão da App Store (exige metadados/screenshots prontos no App Store Connect):
        # submit_to_app_store: true
