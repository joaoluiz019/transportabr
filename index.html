<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TransportaBR" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>TransportaBR</title>
  </head>
  <body>
    <!-- Splash animado: já pintado no HTML inicial para não haver flash quando o
         splash nativo do iOS é escondido. main.jsx faz o fade-out e remove. -->
    <div id="animated-splash">
      <img src="/splash.gif" alt="TransportaBR" />
    </div>
    <style>
      #animated-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        transition: opacity 400ms ease;
      }
      #animated-splash img {
        width: 60%;
        max-width: 320px;
        height: auto;
      }
      #animated-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
